<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To My Love - MIDO</title>
    <style>
        body {
            margin: 0;
            background-color: black;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Arial Black', sans-serif;
        }
        canvas {
            display: block;
            position: absolute;
            z-index: 10;
        }
        /* قلب البداية: جذاب ونابض بهدوء */
        #startBtn {
            position: absolute;
            z-index: 100;
            font-size: 110px;
            color: #FF0000;
            cursor: pointer;
            animation: softPulse 1.5s infinite;
            filter: drop-shadow(0 0 25px rgba(255, 0, 0, 0.6));
            user-select: none;
        }
        @keyframes softPulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.2); opacity: 0.7; }
            100% { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body>

    <div id="startBtn">❤️</div>

    <audio id="loveAudio" loop>
        <source src="https://www.myinstants.com/media/sounds/love-you-3.mp3" type="audio/mpeg">
    </audio>

    <canvas id="mainCanvas"></canvas>

    <script>
        const canvas = document.getElementById('mainCanvas');
        const ctx = canvas.getContext('2d');
        const startBtn = document.getElementById('startBtn');
        const audio = document.getElementById('loveAudio');
        
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let allPoints = [];
        const heartSize = 3.5;
        let isStarted = false;

        function setupPoints() {
            ctx.fillStyle = "white";
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            
            // تحديد أماكن الكلمات
            ctx.font = "bold 85px Arial Black";
            ctx.fillText("love you", canvas.width / 2, canvas.height / 2 - 60);
            ctx.font = "bold 75px Arial Black";
            ctx.fillText("MIDO", canvas.width / 2, canvas.height / 2 + 50);
            
            let data = ctx.getImageData(0, 0, canvas.width, canvas.height).data;
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // استخراج النقاط لرسمها لاحقاً
            for (let y = 0; y < canvas.height; y += 5) {
                for (let x = 0; x < canvas.width; x += 5) {
                    let i = (y * canvas.width + x) * 4;
                    if (data[i] > 128) {
                        allPoints.push({ x: x, y: y });
                    }
                }
            }
            // ترتيب عشوائي ليعطي تأثير الانتشار الرومانسى
            allPoints.sort(() => Math.random() - 0.5);
        }

        function drawSmallHeart(x, y, size, color) {
            ctx.fillStyle = color;
            ctx.beginPath();
            ctx.moveTo(x, y + size / 4);
            ctx.quadraticCurveTo(x, y, x + size / 4, y);
            ctx.quadraticCurveTo(x + size / 2, y, x + size / 2, y + size / 4);
            ctx.quadraticCurveTo(x + size / 2, y, x + size * 3/4, y);
            ctx.quadraticCurveTo(x, y + size / 2, x, y + size / 4);
            ctx.fill();
            // رسم مبسط وسريع للقلب
            ctx.arc(x, y, size/2, 0, Math.PI*2);
            ctx.fill();
        }

        let currentIdx = 0;
        function animate() {
            if (currentIdx < allPoints.length) {
                // سرعة الرسم متناغمة مع هدوء الموسيقى
                let batch = 5; 
                for (let i = 0; i < batch; i++) {
                    if (currentIdx < allPoints.length) {
                        const p = allPoints[currentIdx];
                        let color = `rgb(${200 + Math.random() * 55}, 0, 0)`;
                        drawSmallHeart(p.x, p.y, heartSize, color);
                        currentIdx++;
                    }
                }
                requestAnimationFrame(animate);
            } else {
                // الكلمة النهائية تظهر برقة
                ctx.fillStyle = "white";
                ctx.font = "italic 30px Arial";
                ctx.fillText("Always & Forever 💋", canvas.width / 2, canvas.height / 2 + 160);
            }
        }

        startBtn.addEventListener('click', () => {
            if (isStarted) return;
            isStarted = true;
            startBtn.style.display = 'none';
            
            // خفض مستوى الموسيقى قليلاً لتكون هادئة
            audio.volume = 0.5; 
            audio.play();
            
            animate();
        });

        setupPoints();
        window.addEventListener('resize', () => location.reload());
    </script>
</body>
</html>
