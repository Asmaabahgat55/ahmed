<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To My Love - MIDO</title>
    <style>
        body {
            margin: 0;
            background-color: black;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Arial Black', sans-serif;
        }
        canvas {
            display: block;
            position: absolute;
            z-index: 10;
        }
        /* القلب الكبير النابض */
        #startBtn {
            position: absolute;
            z-index: 100;
            font-size: 120px;
            color: #FF0000;
            cursor: pointer;
            animation: pulse 0.6s infinite;
            filter: drop-shadow(0 0 30px #ff0000);
            user-select: none;
        }
        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.2); opacity: 0.8; }
            100% { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body>

    <div id="startBtn">❤️</div>

    <audio id="loveAudio" loop>
        <source src="https://www.myinstants.com/media/sounds/love-you-love-you.mp3" type="audio/mpeg">
        <source src="https://actions.google.com/sounds/v1/human/heartbeat.ogg" type="audio/ogg">
    </audio>

    <canvas id="mainCanvas"></canvas>

    <script>
        const canvas = document.getElementById('mainCanvas');
        const ctx = canvas.getContext('2d');
        const startBtn = document.getElementById('startBtn');
        const audio = document.getElementById('loveAudio');
        
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let allPoints = [];
        const heartSize = 4;
        let isStarted = false;

        function setupPoints() {
            ctx.fillStyle = "white";
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            
            // رسم الكلمات أولاً في ذاكرة مؤقتة لأخذ نقاطها
            ctx.font = "bold 85px Arial Black";
            ctx.fillText("love you", canvas.width / 2, canvas.height / 2 - 60);
            ctx.font = "bold 70px Arial Black";
            ctx.fillText("MIDO", canvas.width / 2, canvas.height / 2 + 50);
            
            let data = ctx.getImageData(0, 0, canvas.width, canvas.height).data;
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            for (let y = 0; y < canvas.height; y += 5) {
                for (let x = 0; x < canvas.width; x += 5) {
                    let i = (y * canvas.width + x) * 4;
                    if (data[i] > 128) {
                        allPoints.push({ x: x, y: y });
                    }
                }
            }
            // ترتيب النقاط بشكل عشوائي قليلاً ليعطي تأثير "النبض" أثناء الكتابة
            allPoints.sort(() => Math.random() - 0.5);
        }

        function drawHeart(x, y, size, color) {
            ctx.fillStyle = color;
            ctx.beginPath();
            ctx.moveTo(x, y + size / 4);
            ctx.quadraticCurveTo(x, y, x + size / 4, y);
            ctx.quadraticCurveTo(x + size / 2, y, x + size / 2, y + size / 4);
            ctx.quadraticCurveTo(x + size / 2, y, x + size * 3/4, y);
            ctx.quadraticCurveTo(x + size, y, x + size, y + size / 4);
            ctx.quadraticCurveTo(x + size, y + size / 2, x + size * 3/4, y + size * 3/4);
            ctx.lineTo(x + size / 2, y + size);
            ctx.lineTo(x + size / 4, y + size * 3/4);
            ctx.quadraticCurveTo(x, y + size / 2, x, y + size / 4);
            ctx.fill();
        }

        let currentIdx = 0;
        function animate() {
            if (currentIdx < allPoints.length) {
                // نزيد عدد القلوب التي تظهر مع كل "نبضة" صوتية
                let speed = 8; 
                for (let i = 0; i < speed; i++) {
                    if (currentIdx < allPoints.length) {
                        const p = allPoints[currentIdx];
                        // تلوين القلوب بدرجات الأحمر والوردي
                        let color = `hsl(${Math.random() * 20}, 100%, 50%)`;
                        drawHeart(p.x, p.y, heartSize, color);
                        currentIdx++;
                    }
                }
                requestAnimationFrame(animate);
            } else {
                // الرسالة النهائية
                ctx.fillStyle = "white";
                ctx.font = "italic bold 35px Arial";
                ctx.fillText("My Lovely Husband 💋", canvas.width / 2, canvas.height / 2 + 160);
            }
        }

        startBtn.addEventListener('click', () => {
            if (isStarted) return;
            isStarted = true;
            startBtn.style.display = 'none';
            
            // تشغيل صوت "Love You" المتكرر
            audio.play();
            
            animate();
        });

        setupPoints();
        window.addEventListener('resize', () => location.reload());
    </script>
</body>
</html>
