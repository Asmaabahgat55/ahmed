<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To My Love - MIDO</title>
    <style>
        body {
            margin: 0;
            background-color: black;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Arial Black', sans-serif;
        }
        canvas {
            display: block;
            position: absolute;
            z-index: 10;
        }
        .bg-hearts-container {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: 1;
            overflow: hidden;
        }
        /* القلب الكبير النابض كـ "فخ" رومانسي للضغط */
        #startBtn {
            position: absolute;
            z-index: 100;
            font-size: 100px;
            color: #FF0000;
            cursor: pointer;
            animation: pulse 0.8s infinite;
            user-select: none;
            filter: drop-shadow(0 0 20px rgba(255,0,0,0.8));
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.3); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>

    <div id="startBtn">❤️</div>

    <iframe id="audioPlayer" width="0" height="0" src="" frameborder="0" allow="autoplay"></iframe>

    <div class="bg-hearts-container" id="bgHearts"></div>
    <canvas id="mainCanvas"></canvas>

    <script>
        const canvas = document.getElementById('mainCanvas');
        const ctx = canvas.getContext('2d');
        const startBtn = document.getElementById('startBtn');
        const audioPlayer = document.getElementById('audioPlayer');
        
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let allPoints = [];
        const heartSize = 3;
        let isStarted = false;

        function setupPoints() {
            ctx.fillStyle = "white";
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            ctx.font = "bold 80px Arial Black";
            ctx.fillText("love you", canvas.width / 2, canvas.height / 2 - 60);
            ctx.font = "bold 65px Arial Black";
            ctx.fillText("MIDO", canvas.width / 2, canvas.height / 2 + 40);
            
            let data = ctx.getImageData(0, 0, canvas.width, canvas.height).data;
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            for (let y = 0; y < canvas.height; y += 4) {
                for (let x = 0; x < canvas.width; x += 4) {
                    let i = (y * canvas.width + x) * 4;
                    if (data[i] > 128) allPoints.push({ x: x, y: y });
                }
            }
            allPoints.sort((a, b) => a.y - b.y + (Math.random() * 30 - 15));
        }

        function drawSmallHeart(x, y, size, color) {
            ctx.fillStyle = color;
            ctx.beginPath();
            ctx.moveTo(x, y + size / 4);
            ctx.quadraticCurveTo(x, y, x + size / 4, y);
            ctx.quadraticCurveTo(x + size / 2, y, x + size / 2, y + size / 4);
            ctx.quadraticCurveTo(x + size / 2, y, x + size * 3/4, y);
            ctx.quadraticCurveTo(x + size, y, x + size, y + size / 4);
            ctx.quadraticCurveTo(x + size, y + size / 2, x + size * 3/4, y + size * 3/4);
            ctx.lineTo(x + size / 2, y + size);
            ctx.lineTo(x + size / 4, y + size * 3/4);
            ctx.quadraticCurveTo(x, y + size / 2, x, y + size / 4);
            ctx.fill();
        }

        let currentIdx = 0;
        function animate() {
            if (currentIdx < allPoints.length) {
                for (let i = 0; i < 4; i++) {
                    if (currentIdx < allPoints.length) {
                        const p = allPoints[currentIdx];
                        drawSmallHeart(p.x, p.y, heartSize, "#FF0000");
                        currentIdx++;
                    }
                }
                setTimeout(() => requestAnimationFrame(animate), 55); 
            } else {
                ctx.fillStyle = "white";
                ctx.font = "bold 40px Arial";
                ctx.textAlign = "center";
                ctx.fillText("my lovely husband💋", canvas.width / 2, canvas.height / 2 + 150);
            }
        }

        // الحيلة: عند الضغط على القلب يبدأ الجزء المطلوب من الأغنية فوراً
        startBtn.addEventListener('click', () => {
            if (isStarted) return;
            isStarted = true;
            startBtn.style.display = 'none';

            // هذا الرابط للأغنية الحقيقية (Angel) ويبدأ من مقطع Love you (دقيقة 2:40 تقريباً)
            audioPlayer.src = "https://www.youtube.com/embed/e8cuqDEY474?autoplay=1&start=160&loop=1";

            animate();
        });

        setupPoints();
    </script>
</body>
</html>
