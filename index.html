<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To My Love - Slow Formation</title>
    <style>
        body {
            margin: 0;
            background-color: black;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Arial Black', sans-serif;
        }
        canvas {
            display: block;
            position: absolute;
            z-index: 10;
        }
        .bg-hearts-container {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: 1;
            overflow: hidden;
        }
        .floating-heart {
            position: absolute;
            color: rgba(255, 255, 255, 0.4);
            animation: floatUp linear infinite;
        }
        @keyframes floatUp {
            0% { transform: translateY(110vh) scale(0.5) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 0.4; }
            100% { transform: translateY(-10vh) scale(1.2) rotate(360deg); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="bg-hearts-container" id="bgHearts"></div>
    <canvas id="mainCanvas"></canvas>

    <script>
        const canvas = document.getElementById('mainCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let allPoints = [];
        const heartSize = 3;

        function createRichBg() {
            const bg = document.getElementById('bgHearts');
            const heartSymbols = ['❤', '💖', '❣', '🤍'];
            for (let i = 0; i < 80; i++) {
                let heart = document.createElement('div');
                heart.className = 'floating-heart';
                heart.innerText = heartSymbols[Math.floor(Math.random() * heartSymbols.length)];
                heart.style.left = Math.random() * 100 + 'vw';
                heart.style.fontSize = (Math.random() * 20 + 10) + 'px';
                heart.style.animationDuration = (Math.random() * 8 + 6) + 's';
                heart.style.animationDelay = (Math.random() * 10) + 's';
                heart.style.opacity = Math.random() * 0.5 + 0.2;
                bg.appendChild(heart);
            }
        }

        function drawSmallHeart(x, y, size, color) {
            ctx.fillStyle = color;
            ctx.beginPath();
            ctx.moveTo(x, y + size / 4);
            ctx.quadraticCurveTo(x, y, x + size / 4, y);
            ctx.quadraticCurveTo(x + size / 2, y, x + size / 2, y + size / 4);
            ctx.quadraticCurveTo(x + size / 2, y, x + size * 3/4, y);
            ctx.quadraticCurveTo(x + size, y, x + size, y + size / 4);
            ctx.quadraticCurveTo(x + size, y + size / 2, x + size * 3/4, y + size * 3/4);
            ctx.lineTo(x + size / 2, y + size);
            ctx.lineTo(x + size / 4, y + size * 3/4);
            ctx.quadraticCurveTo(x, y + size / 2, x, y + size / 4);
            ctx.fill();
        }

        function setupPoints() {
            ctx.fillStyle = "white";
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            
            ctx.font = "bold 80px Arial Black";
            ctx.fillText("MY LOVELY HUSBAND", canvas.width / 2, canvas.height / 2 - 60);
            
            ctx.font = "bold 60px Arial Black";
            ctx.fillText("AHMED", canvas.width / 2, canvas.height / 2 + 40);
            
            let data = ctx.getImageData(0, 0, canvas.width, canvas.height).data;
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            for (let y = 0; y < canvas.height; y += 4) {
                for (let x = 0; x < canvas.width; x += 4) {
                    let i = (y * canvas.width + x) * 4;
                    if (data[i] > 128) {
                        allPoints.push({ x: x, y: y });
                    }
                }
            }
            allPoints.sort((a, b) => a.y - b.y + (Math.random() * 20 - 10));
        }

        let currentIdx = 0;
        function animate() {
            if (currentIdx < allPoints.length) {
                // تقليل عدد القلوب المرسومة في كل إطار (من 15 إلى 8) لجعلها أبطأ
                for (let i = 0; i < 8; i++) { 
                    if (currentIdx < allPoints.length) {
                        const p = allPoints[currentIdx];
                        drawSmallHeart(p.x, p.y, heartSize, "#FF0000");
                        currentIdx++;
                    }
                }
                // زيادة وقت التأخير قليلاً (من 15 إلى 25)
                setTimeout(() => requestAnimationFrame(animate), 25); 
            } else {
                ctx.fillStyle = "white";
                ctx.font = "bold 40px Arial";
                ctx.textAlign = "center";
                ctx.textBaseline = "middle";
                ctx.fillText("I LOVE YOU", canvas.width / 2, canvas.height / 2 + 150);
            }
        }

        createRichBg();
        setupPoints();
        animate();

        window.addEventListener('resize', () => location.reload());
    </script>
</body>
</html>
