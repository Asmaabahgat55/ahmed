<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To My Love - Enhanced Background</title>
    <style>
        body {
            margin: 0;
            background-color: black;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Arial Black', sans-serif;
        }
        canvas {
            display: block;
            position: absolute;
            z-index: 10; /* الكانفاس فوق الخلفية */
        }
        /* طبقة الخلفية الغنية بالقلوب الطائرة */
        .bg-hearts-container {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: 1; /* خلف النص */
            overflow: hidden;
        }
        .floating-heart {
            position: absolute;
            color: rgba(255, 255, 255, 0.4); /* قلوب بيضاء نصف شفافة */
            animation: floatUp linear infinite;
        }
        @keyframes floatUp {
            0% { transform: translateY(110vh) scale(0.5) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 0.4; }
            100% { transform: translateY(-10vh) scale(1.2) rotate(360deg); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="bg-hearts-container" id="bgHearts"></div>

    <canvas id="mainCanvas"></canvas>

    <script>
        const canvas = document.getElementById('mainCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let allPoints = [];
        const heartSize = 3;

        // --- 1. إنشاء الخلفية الغنية بالقلوب الطائرة (أكثر كثافة وتنوعاً) ---
        function createRichBg() {
            const bg = document.getElementById('bgHearts');
            const heartSymbols = ['❤', '💖', '❣', '🤍'];
            
            // إنشاء 80 قلب طائر بخصائص عشوائية
            for (let i = 0; i < 80; i++) {
                let heart = document.createElement('div');
                heart.className = 'floating-heart';
                // اختيار رمز قلب عشوائي
                heart.innerText = heartSymbols[Math.floor(Math.random() * heartSymbols.length)];
                
                // موقع أفقي عشوائي
                heart.style.left = Math.random() * 100 + 'vw';
                
                // حجم عشوائي (بين 10px و 30px)
                let size = (Math.random() * 20 + 10) + 'px';
                heart.style.fontSize = size;
                
                // مدة أنيميشن عشوائية (بين 6s و 14s) لسرعات مختلفة
                heart.style.animationDuration = (Math.random() * 8 + 6) + 's';
                
                // تأخير عشوائي لبدء الأنميشن حتى لا تظهر كلها مرة واحدة
                heart.style.animationDelay = (Math.random() * 10) + 's';
                
                // شفافية عشوائية قليلاً
                heart.style.opacity = Math.random() * 0.5 + 0.2;

                bg.appendChild(heart);
            }
        }

        // --- 2. دالة رسم القلب الصغير (الذرة الحمراء المكونة للنص) ---
        function drawSmallHeart(x, y, size, color) {
            ctx.fillStyle = color;
            ctx.beginPath();
            ctx.moveTo(x, y + size / 4);
            ctx.quadraticCurveTo(x, y, x + size / 4, y);
            ctx.quadraticCurveTo(x + size / 2, y, x + size / 2, y + size / 4);
            ctx.quadraticCurveTo(x + size / 2, y, x + size * 3/4, y);
            ctx.quadraticCurveTo(x + size, y, x + size, y + size / 4);
            ctx.quadraticCurveTo(x + size, y + size / 2, x + size * 3/4, y + size * 3/4);
            ctx.lineTo(x + size / 2, y + size);
            ctx.lineTo(x + size / 4, y + size * 3/4);
            ctx.quadraticCurveTo(x, y + size / 2, x, y + size / 4);
            ctx.fill();
        }

        // --- 3. تحليل النصوص وتحويلها لنقاط (الترتيب من الأعلى للأسفل) ---
        function setupPoints() {
            ctx.fillStyle = "white";
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            
            // رسم الجملة الأولى في الخفاء
            ctx.font = "bold 80px Arial Black";
            ctx.fillText("love you", canvas.width / 2, canvas.height / 2 - 60);
            
            // رسم اسم أحمد تحتها في الخفاء
            ctx.font = "bold 60px Arial Black";
            ctx.fillText("medo", canvas.width / 2, canvas.height / 2 + 40);
            
            let data = ctx.getImageData(0, 0, canvas.width, canvas.height).data;
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // استخراج النقاط
            for (let y = 0; y < canvas.height; y += 4) {
                for (let x = 0; x < canvas.width; x += 4) {
                    let i = (y * canvas.width + x) * 4;
                    if (data[i] > 128) { // إذا كان البكسل جزءاً من الحرف
                        allPoints.push({ x: x, y: y });
                    }
                }
            }
            // ترتيب النقاط من فوق لتحت مع قليل من العشوائية الأفقية
            allPoints.sort((a, b) => a.y - b.y + (Math.random() * 20 - 10));
        }

        // --- 4. التحريك (رسم القلوب الحمراء المكونة للنص) ---
        let currentIdx = 0;
        function animate() {
            if (currentIdx < allPoints.length) {
                // رسم 15 قلب في كل إطار
                for (let i = 0; i < 15; i++) {
                    if (currentIdx < allPoints.length) {
                        const p = allPoints[currentIdx];
                        // رسم قلب أحمر صغير دقيق
                        drawSmallHeart(p.x, p.y, heartSize, "#FF0000");
                        currentIdx++;
                    }
                }
                // سرعة التكون
                setTimeout(() => requestAnimationFrame(animate), 15);
            } else {
                // ظهور الجملة الختامية بعد اكتمال القلوب
                ctx.fillStyle = "white";
                ctx.font = "bold 40px Arial";
                ctx.textAlign = "center";
                ctx.textBaseline = "middle";
                ctx.fillText("my lovely husband💋💋💋", canvas.width / 2, canvas.height / 2 + 150);
            }
        }

        // --- بدء التشغيل ---
        createRichBg(); // إنشاء الخلفية أولاً
        setupPoints();   // تحليل النص
        animate();       // بدء التحريك

        // إعادة الضبط عند تغيير حجم النافذة
        window.addEventListener('resize', () => location.reload());
    </script>
</body>

</html>
