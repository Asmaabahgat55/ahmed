<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To My Love - Mido</title>
    <style>
        body {
            margin: 0;
            background-color: black;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Arial Black', sans-serif;
            cursor: pointer;
        }
        canvas {
            display: block;
            position: absolute;
            z-index: 10;
        }
        .bg-hearts-container {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: 1;
            overflow: hidden;
        }
        /* تصميم القلب النابض في البداية */
        #startBtn {
            position: absolute;
            z-index: 100;
            font-size: 80px;
            color: #FF0000;
            cursor: pointer;
            animation: pulse 1.2s infinite;
            user-select: none;
            text-shadow: 0 0 20px rgba(255, 0, 0, 0.5);
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.3); }
            100% { transform: scale(1); }
        }
        .floating-heart {
            position: absolute;
            color: rgba(255, 255, 255, 0.4);
            animation: floatUp linear infinite;
        }
        @keyframes floatUp {
            0% { transform: translateY(110vh) scale(0.5) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 0.4; }
            100% { transform: translateY(-10vh) scale(1.2) rotate(360deg); opacity: 0; }
        }
    </style>
</head>
<body>

    <div id="startBtn">❤</div>

    <div class="bg-hearts-container" id="bgHearts"></div>
    <canvas id="mainCanvas"></canvas>

    <script>
        const canvas = document.getElementById('mainCanvas');
        const ctx = canvas.getContext('2d');
        const startBtn = document.getElementById('startBtn');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let allPoints = [];
        const heartSize = 3;
        let audioCtx = null;
        let isStarted = false;

        // 1. صوت دقات قلب قوية
        function playStrongHeartbeat() {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'triangle'; 
            osc.frequency.setValueAtTime(50, audioCtx.currentTime); 
            osc.frequency.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);
            gain.gain.setValueAtTime(0.8, audioCtx.currentTime); 
            gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.15);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.15);
        }

        // 2. موسيقى خلفية
        function playAmbientMusic() {
            const notes = [261.63, 329.63, 392.00, 523.25]; 
            let i = 0;
            setInterval(() => {
                if (!audioCtx) return;
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(notes[i % notes.length], audioCtx.currentTime);
                gain.gain.setValueAtTime(0.08, audioCtx.currentTime); 
                gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 2.5);
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start();
                osc.stop(audioCtx.currentTime + 2.5);
                i++;
            }, 1200);
        }

        function createRichBg() {
            const bg = document.getElementById('bgHearts');
            const heartSymbols = ['❤', '💖', '❣', '🤍'];
            for (let i = 0; i < 80; i++) {
                let heart = document.createElement('div');
                heart.className = 'floating-heart';
                heart.innerText = heartSymbols[Math.floor(Math.random() * heartSymbols.length)];
                heart.style.left = Math.random() * 100 + 'vw';
                heart.style.fontSize = (Math.random() * 20 + 10) + 'px';
                heart.style.animationDuration = (Math.random() * 8 + 6) + 's';
                heart.style.opacity = Math.random() * 0.5 + 0.2;
                bg.appendChild(heart);
            }
        }

        function drawSmallHeart(x, y, size, color) {
            ctx.fillStyle = color;
            ctx.beginPath();
            ctx.moveTo(x, y + size / 4);
            ctx.quadraticCurveTo(x, y, x + size / 4, y);
            ctx.quadraticCurveTo(x + size / 2, y, x + size / 2, y + size / 4);
            ctx.quadraticCurveTo(x + size / 2, y, x + size * 3/4, y);
            ctx.quadraticCurveTo(x + size, y, x + size, y + size / 4);
            ctx.quadraticCurveTo(x + size, y + size / 2, x + size * 3/4, y + size * 3/4);
            ctx.lineTo(x + size / 2, y + size);
            ctx.lineTo(x + size / 4, y + size * 3/4);
            ctx.quadraticCurveTo(x, y + size / 2, x, y + size / 4);
            ctx.fill();
        }

        function setupPoints() {
            ctx.fillStyle = "white";
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            ctx.font = "bold 80px Arial Black";
            ctx.fillText("love you", canvas.width / 2, canvas.height / 2 - 60);
            ctx.font = "bold 60px Arial Black";
            ctx.fillText("medo", canvas.width / 2, canvas.height / 2 + 40);
            let data = ctx.getImageData(0, 0, canvas.width, canvas.height).data;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let y = 0; y < canvas.height; y += 4) {
                for (let x = 0; x < canvas.width; x += 4) {
                    let i = (y * canvas.width + x) * 4;
                    if (data[i] > 128) allPoints.push({ x: x, y: y });
                }
            }
            allPoints.sort((a, b) => a.y - b.y + (Math.random() * 20 - 10));
        }

        let currentIdx = 0;
        function animate() {
            if (currentIdx < allPoints.length) {
                for (let i = 0; i < 4; i++) { 
                    if (currentIdx < allPoints.length) {
                        const p = allPoints[currentIdx];
                        drawSmallHeart(p.x, p.y, heartSize, "#FF0000");
                        currentIdx++;
                    }
                }
                if (currentIdx % 35 === 0) playStrongHeartbeat();
                setTimeout(() => requestAnimationFrame(animate), 50); 
            } else {
                ctx.fillStyle = "white";
                ctx.font = "bold 40px Arial";
                ctx.textAlign = "center";
                ctx.textBaseline = "middle";
                ctx.fillText("my lovely husband💋💋💋", canvas.width / 2, canvas.height / 2 + 150);
            }
        }

        // تشغيل كل شيء عند الضغط على القلب النابض
        startBtn.addEventListener('click', () => {
            if (isStarted) return;
            isStarted = true;
            startBtn.style.display = 'none'; // اختفاء القلب الكبير
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            playAmbientMusic();
            animate();
        });

        createRichBg();
        setupPoints();
        window.addEventListener('resize', () => location.reload());
    </script>
</body>
</html>
